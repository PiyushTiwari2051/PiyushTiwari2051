<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 340" width="100%" height="100%">
  <defs>
    <!-- Fonts -->
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&amp;family=Orbitron:wght@500;700&amp;display=swap');
      
      .terminal-header-text {
        font-family: 'Orbitron', 'Segoe UI', sans-serif;
        font-weight: 700;
        font-size: 11px;
        fill: #94A3B8;
        letter-spacing: 1.5px;
      }
      
      .term-code {
        font-family: 'Fira Code', monospace;
        font-size: 12.5px;
        fill: #E2E8F0;
        line-height: 1.6;
      }
      
      .cmd-color { fill: #38BDF8; font-weight: bold; }
      .prompt-color { fill: #10B981; font-weight: bold; }
      .lbl-color { fill: #00E5FF; font-weight: bold; }
      .val-color { fill: #E2E8F0; }
      .success-color { fill: #10B981; font-weight: bold; }
      .pending-color { fill: #F59E0B; font-weight: bold; }
      .bullet-color { fill: #EC4899; }
      .dim-color { fill: #64748B; }

      @keyframes cursor-blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      
      @keyframes window-glow {
        0%, 100% { filter: drop-shadow(0 0 10px rgba(56, 189, 248, 0.15)); }
        50% { filter: drop-shadow(0 0 15px rgba(56, 189, 248, 0.25)); }
      }
      
      .cursor {
        animation: cursor-blink 1s infinite steps(2);
        fill: #00E5FF;
      }
      
      .terminal-container {
        animation: window-glow 6s infinite ease-in-out;
      }
    </style>
    
    <linearGradient id="term-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
  </defs>

  <!-- Main Terminal Window Container -->
  <g class="terminal-container">
    <!-- Window Shadow & Background -->
    <rect width="1000" height="340" rx="12" fill="url(#term-bg)" stroke="#1E293B" stroke-width="2"/>
    
    <!-- Title Bar -->
    <path d="M 0,12 A 12,12 0 0,1 12,0 L 988,0 A 12,12 0 0,1 1000,12 L 1000,35 L 0,35 Z" fill="#090D16" stroke="#1E293B" stroke-width="1"/>
    
    <!-- Window Control Buttons (macOS Style) -->
    <!-- Red (Close) -->
    <circle cx="20" cy="17.5" r="6" fill="#EF4444"/>
    <!-- Yellow (Minimize) -->
    <circle cx="40" cy="17.5" r="6" fill="#F59E0B"/>
    <!-- Green (Maximize) -->
    <circle cx="60" cy="17.5" r="6" fill="#10B981"/>
    
    <!-- Terminal Title -->
    <text x="500" y="22" class="terminal-header-text" text-anchor="middle">piyush@dev: ~ (zsh)</text>
  </g>

  <!-- ================= TERMINAL CONTENT ================= -->
  <g transform="translate(25, 60)" class="term-code">
    
    <!-- Line 1: Command execution -->
    <text x="0" y="0"><tspan class="prompt-color">piyush@dev:~$</tspan> <tspan class="cmd-color">neofetch --bio</tspan></text>
    
    <!-- Neofetch Left Side: Cybernetic ASCII Logo -->
    <g transform="translate(10, 20)">
      <!-- Custom matrix-themed geometric design -->
      <path d="M 0,0 L 80,0 L 100,20 L 100,100 L 20,100 L 0,80 Z" fill="none" stroke="#38BDF8" stroke-width="1.5" opacity="0.3"/>
      <path d="M 10,10 L 90,10 L 90,90 L 10,90 Z" fill="none" stroke="#00E5FF" stroke-width="1" stroke-dasharray="2,4" opacity="0.5"/>
      <polygon points="50,15 85,75 15,75" fill="none" stroke="#EC4899" stroke-width="2" opacity="0.8"/>
      <line x1="50" y1="15" x2="50" y2="75" stroke="#EC4899" stroke-width="1" stroke-dasharray="2,2"/>
      <circle cx="50" cy="48" r="8" fill="none" stroke="#00E5FF" stroke-width="1.5"/>
      <circle cx="50" cy="48" r="2" fill="#00E5FF"/>
      
      <!-- Tech Readouts inside logo box -->
      <text x="50" y="115" font-family="'Orbitron', sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle" letter-spacing="1">SHIPPED_ENG</text>
    </g>

    <!-- Neofetch Right Side: Specs -->
    <g transform="translate(135, 20)">
      <text x="0" y="10"><tspan class="lbl-color">User:</tspan> <tspan class="val-color">Piyush Tiwari</tspan></text>
      <text x="0" y="28"><tspan class="lbl-color">Role:</tspan> <tspan class="val-color">Full Stack Developer &amp; SaaS Builder</tspan></text>
      <text x="0" y="46"><tspan class="lbl-color">Univ:</tspan> <tspan class="val-color">IMS Engineering College (B.Tech CSE)</tspan></text>
      <text x="0" y="64"><tspan class="lbl-color">Batch:</tspan> <tspan class="val-color">2023 → 2027 (Undergrad)</tspan></text>
      <text x="0" y="82"><tspan class="lbl-color">Shell:</tspan> <tspan class="val-color">Next.js / Node.js / TypeScript</tspan></text>
      <text x="0" y="100"><tspan class="lbl-color">Uptime:</tspan> <tspan class="val-color">24/7 Grind (Solving DSA daily)</tspan></text>
    </g>

    <!-- Line 2: Cat sprint command -->
    <g transform="translate(0, 140)">
      <text x="0" y="10"><tspan class="prompt-color">piyush@dev:~$</tspan> <tspan class="cmd-color">cat current_sprint.txt</tspan></text>
      
      <!-- Sprint Checklist -->
      <g transform="translate(15, 32)">
        <text x="0" y="0"><tspan class="success-color">[✔]</tspan> <tspan class="val-color">Mastering DSA — Arrays, Trees, Graphs, DP, Sliding Window</tspan></text>
        <text x="0" y="18"><tspan class="success-color">[✔]</tspan> <tspan class="val-color">Building production SaaS — SmartQueue, Raasta-Fix, Portfolio Master</tspan></text>
        <text x="0" y="36"><tspan class="pending-color">[⟳]</tspan> <tspan class="val-color">System Design (HLD + LLD fundamentals)</tspan></text>
        <text x="0" y="54"><tspan class="bullet-color">[•]</tspan> <tspan class="val-color">TypeScript advanced types &amp; CI/CD deployment pipelines</tspan></text>
        <text x="0" y="72"><tspan class="bullet-color">[•]</tspan> <tspan class="val-color">Preparing for Summer 2026/2027 SWE Internship interviews</tspan></text>
      </g>
    </g>

    <!-- Line 3: Goal & cursor -->
    <g transform="translate(0, 260)">
      <text x="0" y="0"><tspan class="prompt-color">piyush@dev:~$</tspan> <tspan class="cmd-color">echo $GOAL</tspan></text>
      <text x="15" y="18" fill="#F59E0B" font-weight="bold">"Ship products. Solve problems. Never stop learning."</text>
      
      <!-- Prompt cursor line -->
      <text x="0" y="42"><tspan class="prompt-color">piyush@dev:~$</tspan> <rect x="105" y="30" width="8" height="15" class="cursor"/></text>
    </g>

  </g>
</svg>
