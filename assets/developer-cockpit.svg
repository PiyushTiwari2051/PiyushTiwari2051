<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 320" width="100%" height="100%">
  <defs>
    <!-- Fonts -->
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&amp;family=Orbitron:wght@500;800;900&amp;display=swap');
      
      .title-text {
        font-family: 'Orbitron', 'Segoe UI', sans-serif;
        font-weight: 900;
        fill: #38BDF8;
        font-size: 42px;
        letter-spacing: 5px;
        filter: drop-shadow(0 0 8px rgba(56, 189, 248, 0.6));
      }
      
      .subtitle-text {
        font-family: 'Orbitron', 'Segoe UI', sans-serif;
        font-weight: 500;
        fill: #00E5FF;
        font-size: 16px;
        letter-spacing: 4px;
      }
      
      .terminal-text {
        font-family: 'Fira Code', monospace;
        font-size: 13px;
        fill: #E2E8F0;
      }

      .terminal-cyan { fill: #00E5FF; font-weight: bold; }
      .terminal-amber { fill: #F59E0B; font-weight: bold; }
      .terminal-green { fill: #10B981; font-weight: bold; }
      .terminal-pink { fill: #EC4899; font-weight: bold; }
      .terminal-dim { fill: #64748B; }

      /* CSS Animations */
      @keyframes pulse {
        0%, 100% { opacity: 0.2; }
        50% { opacity: 0.8; }
      }
      
      @keyframes scanline {
        0% { transform: translateY(-320px); }
        100% { transform: translateY(320px); }
      }
      
      @keyframes radar-sweep {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      @keyframes grid-glow {
        0%, 100% { opacity: 0.15; }
        50% { opacity: 0.35; }
      }

      @keyframes glitch {
        0%, 100% { transform: translate(0); }
        20% { transform: translate(-2px, 2px); }
        40% { transform: translate(-1px, -1px); }
        60% { transform: translate(2px, -2px); }
        80% { transform: translate(1px, 1px); }
      }

      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }

      @keyframes flow-line {
        0% { stroke-dashoffset: 100; }
        100% { stroke-dashoffset: 0; }
      }
      
      .anim-pulse { animation: pulse 3s infinite ease-in-out; }
      .anim-grid { animation: grid-glow 6s infinite ease-in-out; }
      .anim-radar { transform-origin: 120px 160px; animation: radar-sweep 8s infinite linear; }
      .anim-blink { animation: blink 1s infinite steps(2); }
      .anim-glitch { animation: glitch 4s infinite linear; }
      
      .glow-blue { filter: drop-shadow(0 0 6px rgba(56, 189, 248, 0.5)); }
      .glow-cyan { filter: drop-shadow(0 0 6px rgba(0, 229, 255, 0.5)); }
      .glow-amber { filter: drop-shadow(0 0 6px rgba(245, 158, 11, 0.5)); }
      
      .grid-lines {
        stroke: #1E293B;
        stroke-width: 1;
        opacity: 0.2;
      }
      
      .panel-border {
        stroke: #334155;
        stroke-width: 1.5;
        fill: none;
      }
      
      .accent-corner {
        fill: #38BDF8;
      }
    </style>
    
    <!-- Linear Gradients -->
    <linearGradient id="panel-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080B11"/>
      <stop offset="50%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#030712"/>
    </linearGradient>
    
    <linearGradient id="scanline-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00E5FF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="glow-line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0"/>
      <stop offset="15%" stop-color="#38BDF8" stop-opacity="1"/>
      <stop offset="50%" stop-color="#00E5FF" stop-opacity="1"/>
      <stop offset="85%" stop-color="#EC4899" stop-opacity="1"/>
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="radar-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.3"/>
      <stop offset="80%" stop-color="#00E5FF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background Base -->
  <rect width="1000" height="320" rx="16" fill="url(#panel-grad)"/>

  <!-- Futuristic Sci-fi Grid Overlay -->
  <g class="anim-grid">
    <!-- Vertical lines -->
    <path d="M 50,0 L 50,320 M 100,0 L 100,320 M 150,0 L 150,320 M 200,0 L 200,320 M 250,0 L 250,320 M 300,0 L 300,320 M 350,0 L 350,320 M 400,0 L 400,320 M 450,0 L 450,320 M 500,0 L 500,320 M 550,0 L 550,320 M 600,0 L 600,320 M 650,0 L 650,320 M 700,0 L 700,320 M 750,0 L 750,320 M 800,0 L 800,320 M 850,0 L 850,320 M 900,0 L 900,320 M 950,0 L 950,320" class="grid-lines"/>
    <!-- Horizontal lines -->
    <path d="M 0,40 L 1000,40 M 0,80 L 1000,80 M 0,120 L 1000,120 M 0,160 L 1000,160 M 0,200 L 1000,200 M 0,240 L 1000,240 M 0,280 L 1000,280" class="grid-lines"/>
  </g>

  <!-- Animated Scanline -->
  <g clip-path="url(#clip-main)">
    <rect width="1000" height="320" fill="url(#scanline-grad)" style="animation: scanline 6s infinite linear;"/>
  </g>

  <!-- Outer Dashboard Bezel & Panels -->
  <!-- Top Bezel -->
  <path d="M 0,20 L 20,0 L 980,0 L 1000,20 L 1000,40 L 970,30 L 30,30 L 0,40 Z" fill="#1E293B" opacity="0.4"/>
  
  <!-- Outer glowing wireframe border -->
  <rect x="5" y="5" width="990" height="310" rx="12" class="panel-border" stroke="#334155"/>
  <rect x="8" y="8" width="984" height="304" rx="10" stroke="#0F172A" stroke-width="2" fill="none"/>

  <!-- Sci-Fi Corner Accents -->
  <!-- Top-Left -->
  <path d="M 5,35 L 5,5 L 35,5 L 35,8 L 8,8 L 8,35 Z" class="accent-corner glow-blue"/>
  <circle cx="45" cy="15" r="3" fill="#38BDF8"/>
  <circle cx="60" cy="15" r="2" fill="#38BDF8" opacity="0.5"/>
  <!-- Top-Right -->
  <path d="M 995,35 L 995,5 L 965,5 L 965,8 L 992,8 L 992,35 Z" class="accent-corner glow-blue"/>
  <circle cx="955" cy="15" r="3" fill="#38BDF8"/>
  <!-- Bottom-Left -->
  <path d="M 5,285 L 5,315 L 35,315 L 35,312 L 8,312 L 8,285 Z" class="accent-corner glow-blue"/>
  <circle cx="45" cy="305" r="3" fill="#38BDF8"/>
  <!-- Bottom-Right -->
  <path d="M 995,285 L 995,315 L 965,315 L 965,312 L 992,312 L 992,285 Z" class="accent-corner glow-blue"/>
  <circle cx="955" cy="305" r="3" fill="#38BDF8"/>

  <!-- ================= LEFT PANEL: RADAR & SYSTEMS ================= -->
  <g transform="translate(10, 0)">
    <!-- Radar Base -->
    <circle cx="120" cy="160" r="75" fill="#020617" stroke="#1E293B" stroke-width="2"/>
    <circle cx="120" cy="160" r="75" fill="url(#radar-grad)"/>
    <!-- Radar Grids -->
    <circle cx="120" cy="160" r="55" fill="none" stroke="#00E5FF" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
    <circle cx="120" cy="160" r="35" fill="none" stroke="#00E5FF" stroke-width="0.5" opacity="0.5"/>
    <circle cx="120" cy="160" r="15" fill="none" stroke="#00E5FF" stroke-width="0.5" opacity="0.5"/>
    
    <!-- Radar Axis -->
    <line x1="45" y1="160" x2="195" y2="160" stroke="#00E5FF" stroke-width="0.5" opacity="0.4"/>
    <line x1="120" y1="85" x2="120" y2="235" stroke="#00E5FF" stroke-width="0.5" opacity="0.4"/>
    
    <!-- Rotating Sweep -->
    <g class="anim-radar">
      <line x1="120" y1="160" x2="120" y2="85" stroke="#00E5FF" stroke-width="2" class="glow-cyan"/>
      <polygon points="120,160 120,85 100,88" fill="#00E5FF" opacity="0.15"/>
      <polygon points="120,160 100,88 85,95" fill="#00E5FF" opacity="0.08"/>
    </g>

    <!-- Radar Blips -->
    <circle cx="85" cy="125" r="3" fill="#FF5733" class="anim-pulse glow-amber"/>
    <circle cx="160" cy="190" r="4" fill="#00E5FF" class="anim-pulse glow-cyan" style="animation-delay: 1.5s;"/>
    <circle cx="140" cy="120" r="2.5" fill="#10B981" class="anim-pulse" style="animation-delay: 0.7s;"/>

    <!-- Dial markings -->
    <path d="M 40,160 A 80,80 0 0,1 200,160" fill="none" stroke="#334155" stroke-width="3" stroke-dasharray="2,6"/>
    <text x="120" y="250" font-family="'Orbitron', sans-serif" font-size="10" fill="#00E5FF" text-anchor="middle" letter-spacing="2">SYSTEM SCANNER</text>
  </g>

  <!-- Separator Line (Left to Center) -->
  <line x1="230" y1="50" x2="230" y2="270" stroke="#1E293B" stroke-width="1.5" stroke-dasharray="5,5"/>

  <!-- ================= CENTER PANEL: MAIN BIO ================= -->
  <!-- Glowing Horizontal divider below title -->
  <path d="M 260,115 L 700,115" stroke="url(#glow-line-grad)" stroke-width="2"/>
  
  <g class="anim-glitch" transform="translate(10, 0)">
    <text x="260" y="95" class="title-text">PIYUSH TIWARI</text>
  </g>
  <text x="690" y="90" class="subtitle-text" text-anchor="end">v2.5.1</text>
  
  <!-- Typing Subtitle / Badge -->
  <g transform="translate(260, 138)">
    <rect x="0" y="-16" width="370" height="24" rx="4" fill="#0F172A" stroke="#38BDF8" stroke-width="1" opacity="0.6"/>
    <circle cx="12" cy="-4" r="4" fill="#10B981" class="anim-blink"/>
    <text x="26" y="-1" font-family="'Fira Code', monospace" font-size="12" fill="#38BDF8" font-weight="bold">
      FULL STACK DEVELOPER • SaaS BUILDER • CS UNDERGRAD
    </text>
  </g>

  <!-- Quick Specs / Tech Stats Dashboard -->
  <g transform="translate(260, 175)">
    <!-- Row 1 -->
    <text x="0" y="0" class="terminal-text"><tspan class="terminal-cyan">❯ currently_building:</tspan> "SaaS Products &amp; Scalable Systems"</text>
    <!-- Row 2 -->
    <text x="0" y="22" class="terminal-text"><tspan class="terminal-cyan">❯ core_focus:</tspan> ["DSA/LeetCode", "Full-Stack TS/Next.js", "System Design"]</text>
    <!-- Row 3 -->
    <text x="0" y="44" class="terminal-text"><tspan class="terminal-cyan">❯ current_sprint:</tspan> "Mastering Generics &amp; Distributed Architectures"</text>
    <!-- Row 4 -->
    <text x="0" y="66" class="terminal-text"><tspan class="terminal-cyan">❯ super_power:</tspan> <tspan class="terminal-pink">caffeine_engine()</tspan> -> <tspan class="terminal-green">"production_code"</tspan> <tspan class="terminal-dim"># Shipped > Perfect</tspan></text>
  </g>

  <!-- Separator Line (Center to Right) -->
  <line x1="720" y1="50" x2="720" y2="270" stroke="#1E293B" stroke-width="1.5" stroke-dasharray="5,5"/>

  <!-- ================= RIGHT PANEL: SYSTEM METRICS ================= -->
  <g transform="translate(740, 60)">
    <!-- Right Panel Heading -->
    <text x="0" y="0" font-family="'Orbitron', sans-serif" font-size="12" fill="#38BDF8" font-weight="bold" letter-spacing="2">SYSTEM METRICS</text>
    <line x1="0" y1="10" x2="230" y2="10" stroke="#334155" stroke-width="1"/>

    <!-- Metric 1: Coffee Level -->
    <g transform="translate(0, 30)">
      <text x="0" y="0" class="terminal-text" font-size="11">COFFEE CAPACITY</text>
      <text x="230" y="0" class="terminal-text" font-size="11" text-anchor="end" fill="#F59E0B">98%</text>
      <!-- Progress Bar Track -->
      <rect x="0" y="8" width="230" height="6" rx="3" fill="#1E293B"/>
      <!-- Progress Bar Fill -->
      <rect x="0" y="8" width="225" height="6" rx="3" fill="#F59E0B" class="glow-amber">
        <animate attributeName="width" values="0;225;220;225" dur="4s" repeatCount="indefinite" />
      </rect>
    </g>

    <!-- Metric 2: Shipped Rate -->
    <g transform="translate(0, 65)">
      <text x="0" y="0" class="terminal-text" font-size="11">COMPLETED TASKS</text>
      <text x="230" y="0" class="terminal-text" font-size="11" text-anchor="end" fill="#10B981">92%</text>
      <!-- Progress Bar Track -->
      <rect x="0" y="8" width="230" height="6" rx="3" fill="#1E293B"/>
      <!-- Progress Bar Fill -->
      <rect x="0" y="8" width="211" height="6" rx="3" fill="#10B981">
        <animate attributeName="width" values="0;211" dur="2.5s" fill="freeze" />
      </rect>
    </g>

    <!-- Metric 3: Optimization Core -->
    <g transform="translate(0, 100)">
      <text x="0" y="0" class="terminal-text" font-size="11">DSA COMPILATION</text>
      <text x="230" y="0" class="terminal-text" font-size="11" text-anchor="end" fill="#EC4899">87%</text>
      <!-- Progress Bar Track -->
      <rect x="0" y="8" width="230" height="6" rx="3" fill="#1E293B"/>
      <!-- Progress Bar Fill -->
      <rect x="0" y="8" width="200" height="6" rx="3" fill="#EC4899">
        <animate attributeName="width" values="0;150;200;195;200" dur="5s" repeatCount="indefinite" />
      </rect>
    </g>

    <!-- Status indicator widget -->
    <g transform="translate(0, 145)">
      <rect x="0" y="0" width="230" height="35" rx="6" fill="#080B11" stroke="#334155" stroke-width="1"/>
      <circle cx="20" cy="17" r="5" fill="#10B981" class="anim-blink"/>
      <text x="35" y="22" font-family="'Orbitron', sans-serif" font-size="10" fill="#10B981" font-weight="bold" letter-spacing="1">STATUS: SWE_INTERNSHIP_READY</text>
    </g>
  </g>

  <!-- Decorative Matrix-like numbers at the bottom -->
  <text x="260" y="295" font-family="monospace" font-size="9" fill="#1E293B" opacity="0.7">LOC: 28.6698 N, 77.4498 E | BATCH: 2023_2027 | SECURE_SHELL_CONNECTED</text>
  <text x="990" y="295" font-family="monospace" font-size="9" fill="#1E293B" opacity="0.7" text-anchor="end">SYS_LOAD: 0.42 // CORES: 8 // MEM_OK</text>
</svg>
